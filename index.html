<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dark Calculator</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top, #1f2937 0%, #0b1020 45%, #05070f 100%);
      font-family: 'Inter', sans-serif;
      color: #e5e7eb;
    }

    .app {
      padding: 24px;
    }

    .calculator {
      width: min(92vw, 360px);
      background: rgba(15, 23, 42, 0.92);
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 28px;
      padding: 22px;
      box-shadow:
        0 20px 60px rgba(0, 0, 0, 0.45),
        inset 0 1px 0 rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(10px);
    }

    #screen {
      width: 100%;
      height: 96px;
      border: none;
      outline: none;
      border-radius: 20px;
      margin-bottom: 18px;
      padding: 18px 20px;
      background: linear-gradient(180deg, #020617 0%, #0f172a 100%);
      color: #f8fafc;
      font-size: clamp(28px, 5vw, 42px);
      text-align: right;
      box-shadow: inset 0 0 0 1px rgba(148, 163, 184, 0.16);
    }

    #screen::placeholder {
      color: #64748b;
    }

    .row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 10px;
    }

    .button {
      appearance: none;
      border: none;
      border-radius: 18px;
      min-height: 58px;
      padding: 0 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      color: #e5e7eb;
      background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
      box-shadow:
        0 8px 18px rgba(0, 0, 0, 0.25),
        inset 0 0 0 1px rgba(148, 163, 184, 0.12);
      transition:
        transform 0.14s ease,
        box-shadow 0.14s ease,
        background 0.14s ease,
        color 0.14s ease;
    }

    .button:hover {
      transform: translateY(-2px);
      box-shadow:
        0 12px 24px rgba(0, 0, 0, 0.35),
        inset 0 0 0 1px rgba(255, 255, 255, 0.08);
    }

    .button:active {
      transform: translateY(1px) scale(0.98);
    }

    .number-btn {
      background: linear-gradient(180deg, #273449 0%, #162033 100%);
    }

    .number-btn:hover {
      background: linear-gradient(180deg, #334155 0%, #1f2a3d 100%);
    }

    .operator-btn {
      background: linear-gradient(180deg, #312e81 0%, #1e1b4b 100%);
      color: #ddd6fe;
    }

    .operator-btn:hover {
      background: linear-gradient(180deg, #4338ca 0%, #312e81 100%);
    }

    .func-btn {
      background: linear-gradient(180deg, #0f766e 0%, #134e4a 100%);
      color: #ccfbf1;
    }

    .func-btn:hover {
      background: linear-gradient(180deg, #0d9488 0%, #115e59 100%);
    }

    .clear-btn {
      background: linear-gradient(180deg, #991b1b 0%, #450a0a 100%);
      color: #fee2e2;
    }

    .clear-btn:hover {
      background: linear-gradient(180deg, #dc2626 0%, #7f1d1d 100%);
    }

    .equals-btn {
      background: linear-gradient(180deg, #b45309 0%, #78350f 100%);
      color: #ffedd5;
      grid-row: span 2;
    }

    .equals-btn:hover {
      background: linear-gradient(180deg, #f59e0b 0%, #b45309 100%);
    }

    .zero-btn {
      grid-column: span 3;
    }

    @media (max-width: 560px) {
      .calculator {
        padding: 16px;
        border-radius: 22px;
      }

      .button {
        min-height: 52px;
        font-size: 0.95rem;
        border-radius: 16px;
      }

      .row {
        gap: 8px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="calculator">
      <input type="text" id="screen" placeholder="0" readonly />

      <div class="row">
        <button class="button clear-btn" data-action="clear">AC</button>
        <button class="button func-btn" data-action="delete">DEL</button>
        <button class="button operator-btn" data-value="/">÷</button>
        <button class="button operator-btn" data-value="*">×</button>
      </div>

      <div class="row">
        <button class="button number-btn" data-value="7">7</button>
        <button class="button number-btn" data-value="8">8</button>
        <button class="button number-btn" data-value="9">9</button>
        <button class="button operator-btn" data-value="-">−</button>
      </div>

      <div class="row">
        <button class="button number-btn" data-value="4">4</button>
        <button class="button number-btn" data-value="5">5</button>
        <button class="button number-btn" data-value="6">6</button>
        <button class="button operator-btn" data-value="+">+</button>
      </div>

      <div class="row">
        <button class="button number-btn" data-value="1">1</button>
        <button class="button number-btn" data-value="2">2</button>
        <button class="button number-btn" data-value="3">3</button>
        <button class="button equals-btn" data-action="equals">=</button>
      </div>

      <div class="row">
        <button class="button zero-btn number-btn" data-value="0">0</button>
        <button class="button number-btn" data-value=".">.</button>
      </div>
    </div>
  </div>

  <script>
    const screen = document.getElementById("screen");
    const buttons = document.querySelectorAll(".button");

    buttons.forEach((button) => {
      button.addEventListener("click", () => {
        const value = button.dataset.value;
        const action = button.dataset.action;

        if (value !== undefined) {
          appendValue(value);
          return;
        }

        switch (action) {
          case "clear":
            clearScreen();
            break;
          case "delete":
            deleteLast();
            break;
          case "equals":
            evaluateExpression();
            break;
        }
      });
    });

    function appendValue(value) {
      if (screen.value === "Error") {
        screen.value = "";
      }
      screen.value += value;
    }

    function clearScreen() {
      screen.value = "";
    }

    function deleteLast() {
      if (screen.value === "Error") {
        screen.value = "";
        return;
      }
      screen.value = screen.value.slice(0, -1);
    }

    function evaluateExpression() {
      try {
        const expression = screen.value.trim();

        if (!expression) return;

        const result = Function('"use strict"; return (' + expression + ')')();

        if (!Number.isFinite(result)) {
          screen.value = "Error";
          return;
        }

        screen.value = formatResult(result);
      } catch {
        screen.value = "Error";
      }
    }

    function formatResult(value) {
      if (Math.abs(value) < 1e-12) return "0";
      return Number(value.toFixed(10)).toString();
    }
  </script>
</body>
</html>
